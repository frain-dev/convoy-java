# Publishes to Maven Central via the Sonatype Central Portal.
# Requires repo secrets: MAVEN_CENTRAL_USERNAME, MAVEN_CENTRAL_PASSWORD,
# SIGNING_KEY, SIGNING_PASSWORD. Does not run until a release is published
# or this workflow is dispatched manually.
#
# Gradle's maven-publish only PUTs into the OSSRH Staging API. Central will
# not see the deployment until we POST /manual/upload/... from the same CI
# IP (or with ip=any for a prior runner). Prefer publishing_type=automatic
# so validation success releases to Maven Central without a Portal click.
#
# If staging already has portal_deployment_id, skip OSSRH re-upload and use
# the Publisher Portal status/publish APIs instead.
name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}
          persist-credentials: false

      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@ac638b010cf58a27ee6c972d7336334ccaf61c96 # v4.4.1

      - name: Publish to Maven Central
        run: ./gradlew publish
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Promote OSSRH staging / finish Portal deployment
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          set -euo pipefail
          AUTH=$(printf '%s:%s' "$MAVEN_CENTRAL_USERNAME" "$MAVEN_CENTRAL_PASSWORD" | base64 | tr -d '\n')
          export AUTH

          curl -sS \
            -H "Authorization: Bearer ${AUTH}" \
            "https://ossrh-staging-api.central.sonatype.com/manual/search/repositories?ip=any" \
            -o repos.json
          echo "Staging repositories:"
          cat repos.json
          echo

          python3 <<'PY'
          import json, os, subprocess, sys, time, urllib.parse

          auth = os.environ["AUTH"]
          hdr = f"Authorization: Bearer {auth}"

          def curl_json(method, url, fail_ok=False):
              """Run curl; print body; return (http_code, body). Never hide body on errors."""
              cmd = [
                  "curl", "-sS", "-X", method,
                  "-H", hdr,
                  "-H", "Accept: application/json",
                  "-w", "\n__HTTP_STATUS__%{http_code}",
                  url,
              ]
              out = subprocess.check_output(cmd, text=True)
              if "__HTTP_STATUS__" in out:
                  body, _, code_s = out.rpartition("__HTTP_STATUS__")
                  code = int(code_s.strip())
              else:
                  body, code = out, 0
              body = body.strip()
              print(f"{method} {url}")
              print(f"http_status={code}")
              if body:
                  print(body)
              if not fail_ok and code >= 400:
                  print(f"::error::Request failed with HTTP {code}", file=sys.stderr)
                  sys.exit(1)
              return code, body

          def portal_finish(deployment_id):
              # Poll status until VALIDATED / PUBLISHING / PUBLISHED / FAILED.
              for attempt in range(30):
                  code, body = curl_json(
                      "POST",
                      f"https://central.sonatype.com/api/v1/publisher/status?id={urllib.parse.quote(deployment_id, safe='')}",
                      fail_ok=True,
                  )
                  if code >= 400:
                      print(f"::error::Portal status failed HTTP {code}")
                      sys.exit(1)
                  try:
                      st = json.loads(body) if body else {}
                  except json.JSONDecodeError:
                      st = {}
                  deployment_state = st.get("deploymentState") or st.get("state") or ""
                  print(f"deployment {deployment_id} state={deployment_state!r} (attempt {attempt+1})")
                  if deployment_state == "FAILED":
                      print("::error::Portal deployment FAILED")
                      errs = st.get("errors") or st.get("deploymentErrors") or st
                      print(json.dumps(errs, indent=2))
                      sys.exit(1)
                  if deployment_state in ("PUBLISHED", "PUBLISHING"):
                      print(f"Deployment already {deployment_state}; nothing to do.")
                      return
                  if deployment_state == "VALIDATED":
                      code, body = curl_json(
                          "POST",
                          f"https://central.sonatype.com/api/v1/publisher/deployment/{urllib.parse.quote(deployment_id, safe='')}",
                      )
                      print(f"Published deployment {deployment_id}")
                      return
                  # PENDING / VALIDATING / etc.
                  time.sleep(10)
              print("::error::Timed out waiting for Portal VALIDATED")
              sys.exit(1)

          data = json.load(open("repos.json"))
          repos = data.get("repositories") or []

          # Prefer finishing Portal deployments that were already transferred.
          portal_ids = []
          need_ossrh_promote = False
          for repo in repos:
              key = repo.get("key")
              state = repo.get("state")
              portal_id = repo.get("portal_deployment_id") or repo.get("portalDeploymentId")
              print(f"repo key={key!r} state={state!r} portal_deployment_id={portal_id!r}")
              if portal_id:
                  portal_ids.append(portal_id)
                  continue
              if state in (None, "open", "closed"):
                  need_ossrh_promote = True

          for pid in portal_ids:
              portal_finish(pid)

          if need_ossrh_promote or not repos:
              # Promote this runner's default staging (same IP as gradle publish).
              # Do not use curl -f alone — print body on failure.
              url = (
                  "https://ossrh-staging-api.central.sonatype.com/manual/upload/"
                  "defaultRepository/io.github.frain-dev?publishing_type=automatic"
              )
              code, body = curl_json("POST", url, fail_ok=True)
              if code >= 400:
                  # Common when already transferred (has portal_deployment_id).
                  print(f"defaultRepository promote returned HTTP {code}; body above.")
                  if not portal_ids:
                      print("::error::OSSRH promote failed and no portal_deployment_id to finish")
                      sys.exit(1)
                  print("Continuing with Portal finish for known deployment ids.")
              else:
                  print("Promoted io.github.frain-dev staging deployment (automatic).")
                  # Re-search and finish any new portal ids.
                  time.sleep(5)
                  code, body = curl_json(
                      "GET",
                      "https://ossrh-staging-api.central.sonatype.com/manual/search/repositories?ip=any",
                      fail_ok=True,
                  )
                  try:
                      data2 = json.loads(body) if body else {}
                  except json.JSONDecodeError:
                      data2 = {}
                  for repo in data2.get("repositories") or []:
                      pid = repo.get("portal_deployment_id") or repo.get("portalDeploymentId")
                      if pid and pid not in portal_ids:
                          portal_finish(pid)

          if not portal_ids and not need_ossrh_promote and repos:
              print("No open/closed staging without portal id, and no portal ids to finish.")
          PY
