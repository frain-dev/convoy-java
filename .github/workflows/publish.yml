# Publishes to Maven Central via the Sonatype Central Portal.
# Requires repo secrets: MAVEN_CENTRAL_USERNAME, MAVEN_CENTRAL_PASSWORD,
# SIGNING_KEY, SIGNING_PASSWORD. Does not run until a release is published
# or this workflow is dispatched manually.
#
# Gradle's maven-publish only PUTs into the OSSRH Staging API. Central will
# not see the deployment until we POST /manual/upload/... from the same CI
# IP (or with ip=any for a prior runner). Prefer publishing_type=automatic
# so validation success releases to Maven Central without a Portal click.
name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}
          persist-credentials: false

      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@ac638b010cf58a27ee6c972d7336334ccaf61c96 # v4.4.1

      - name: Publish to Maven Central
        run: ./gradlew publish
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Promote OSSRH staging to Central Portal
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          set -euo pipefail
          AUTH=$(printf '%s:%s' "$MAVEN_CENTRAL_USERNAME" "$MAVEN_CENTRAL_PASSWORD" | base64 | tr -d '\n')
          # Promote the staging repo created by this job's upload (same IP).
          curl -fsS -X POST \
            -H "Authorization: Bearer ${AUTH}" \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/io.github.frain-dev?publishing_type=automatic"
          echo "Promoted io.github.frain-dev staging deployment (automatic)."
