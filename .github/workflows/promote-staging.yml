# One-shot / recovery: promote OSSRH Staging API repositories that were
# uploaded by Gradle but never transferred to the Central Publisher Portal,
# and finish Portal deployments that are VALIDATED but not yet published.
# Must use Portal user-token secrets (same as publish.yml).
name: Promote Staging

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Promote staging / finish Portal deployments
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          set -euo pipefail
          AUTH=$(printf '%s:%s' "$MAVEN_CENTRAL_USERNAME" "$MAVEN_CENTRAL_PASSWORD" | base64 | tr -d '\n')
          export AUTH

          curl -sS \
            -H "Authorization: Bearer ${AUTH}" \
            "https://ossrh-staging-api.central.sonatype.com/manual/search/repositories?ip=any" \
            -o repos.json
          echo "Staging repositories:"
          cat repos.json
          echo

          python3 <<'PY'
          import json, os, subprocess, sys, time, urllib.parse

          auth = os.environ["AUTH"]
          hdr = f"Authorization: Bearer {auth}"

          def curl_json(method, url, fail_ok=False):
              cmd = [
                  "curl", "-sS", "-X", method,
                  "-H", hdr,
                  "-H", "Accept: application/json",
                  "-w", "\n__HTTP_STATUS__%{http_code}",
                  url,
              ]
              out = subprocess.check_output(cmd, text=True)
              if "__HTTP_STATUS__" in out:
                  body, _, code_s = out.rpartition("__HTTP_STATUS__")
                  code = int(code_s.strip())
              else:
                  body, code = out, 0
              body = body.strip()
              print(f"{method} {url}")
              print(f"http_status={code}")
              if body:
                  print(body)
              if not fail_ok and code >= 400:
                  print(f"::error::Request failed with HTTP {code}", file=sys.stderr)
                  sys.exit(1)
              return code, body

          def portal_finish(deployment_id):
              """Return one of: published, publishing, validated_published, failed, pending_timeout."""
              for attempt in range(30):
                  code, body = curl_json(
                      "POST",
                      f"https://central.sonatype.com/api/v1/publisher/status?id={urllib.parse.quote(deployment_id, safe='')}",
                      fail_ok=True,
                  )
                  if code >= 400:
                      print(f"::error::Portal status failed HTTP {code} for {deployment_id}")
                      return "status_error"
                  try:
                      st = json.loads(body) if body else {}
                  except json.JSONDecodeError:
                      st = {}
                  deployment_state = st.get("deploymentState") or st.get("state") or ""
                  print(f"deployment {deployment_id} state={deployment_state!r} (attempt {attempt+1})")
                  if deployment_state == "FAILED":
                      print("Portal deployment FAILED")
                      errs = st.get("errors") or st.get("deploymentErrors") or st
                      print(json.dumps(errs, indent=2))
                      # Drop so a later Publish can re-upload cleanly.
                      dcode, _ = curl_json(
                          "DELETE",
                          f"https://central.sonatype.com/api/v1/publisher/deployment/{urllib.parse.quote(deployment_id, safe='')}",
                          fail_ok=True,
                      )
                      if dcode < 400:
                          print(f"Dropped failed deployment {deployment_id}")
                      else:
                          print(f"Could not drop failed deployment {deployment_id} (HTTP {dcode})")
                      return "failed"
                  if deployment_state == "PUBLISHED":
                      print(f"Deployment already PUBLISHED.")
                      return "published"
                  if deployment_state == "PUBLISHING":
                      print(f"Deployment already PUBLISHING.")
                      return "publishing"
                  if deployment_state == "VALIDATED":
                      curl_json(
                          "POST",
                          f"https://central.sonatype.com/api/v1/publisher/deployment/{urllib.parse.quote(deployment_id, safe='')}",
                      )
                      print(f"Published deployment {deployment_id}")
                      return "validated_published"
                  time.sleep(10)
              print(f"::warning::Timed out waiting for Portal VALIDATED for {deployment_id}")
              return "pending_timeout"

          data = json.load(open("repos.json"))
          repos = data.get("repositories") or []
          promoted = 0
          results = []

          if not repos:
              print("No staging repositories listed; trying defaultRepository...")
              code, body = curl_json(
                  "POST",
                  "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/io.github.frain-dev?publishing_type=automatic",
                  fail_ok=True,
              )
              if code >= 400:
                  print(f"::error::defaultRepository promote failed HTTP {code}")
                  sys.exit(1)
              print("defaultRepository promote requested")
              sys.exit(0)

          for repo in repos:
              key = repo.get("key")
              state = repo.get("state")
              portal_id = repo.get("portal_deployment_id") or repo.get("portalDeploymentId")
              print(f"repo key={key!r} state={state!r} portal_deployment_id={portal_id!r}")

              # Already transferred to Portal — do not re-POST OSSRH upload
              # (defaultRepository / upload/repository returns 400).
              if portal_id:
                  results.append((portal_id, portal_finish(portal_id)))
                  continue

              if not key:
                  continue
              if state not in (None, "open", "closed"):
                  print(f"  skip state={state}")
                  continue

              # Keep slashes in the key path (encoding them as %2F returns 400).
              url = (
                  "https://ossrh-staging-api.central.sonatype.com/manual/upload/repository/"
                  + urllib.parse.quote(key, safe="/")
                  + "?publishing_type=automatic"
              )
              code, body = curl_json("POST", url, fail_ok=True)
              if code >= 400:
                  print(f"::error::OSSRH promote failed HTTP {code} for key={key!r}")
                  results.append((key, "ossrh_promote_error"))
                  continue
              print("  promoted (automatic)")
              promoted += 1

          print(f"OSSRH promoted={promoted} portal_results={results!r}")
          ok = {"published", "publishing", "validated_published"}
          if any(r in ok for _, r in results):
              print("At least one deployment is published or publishing.")
              sys.exit(0)
          if any(r == "failed" for _, r in results):
              print(
                  "::error::All Portal deployments FAILED (often missing PGP public key on "
                  "keyserver.ubuntu.com / keys.openpgp.org / keys.mailvelope.com). "
                  "Failed deployments were dropped when possible; re-run Publish after "
                  "uploading the signing public key."
              )
              sys.exit(1)
          if promoted > 0:
              print("OSSRH promote requested; re-run this workflow to finish Portal publish.")
              sys.exit(0)
          print("::error::Nothing promoted or finished")
          sys.exit(1)
          PY
